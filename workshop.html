<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <header>
    <a href="#" class="logo">Store Logo</a>
        <div>
            <button class="btn" type="button" id="cart"><i class="fa-solid fa-cart-shopping"></i> Cart <span id="cartCount"> 0 </span></button>

            <button class="btn" type="button" id="night"><i class="fa-solid fa-moon"></i></button>

    </div>

        <h2>Latest Products </h2>
        <div class="grid" id="products">
            
        </div>
    </main>

<footer>

</footer>
